name: e2e

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          ENV=test
          PORT=8080
          ALLOWED_ORIGINS=http://localhost:5173
          MONGODB_URI=mongodb://mongo:27017/pulseops?replicaSet=rs0
          MONGODB_DB=pulseops
          JWT_SECRET=ci-test-jwt-secret-32-characters
          JWT_EXPIRY_MINUTES=15
          REFRESH_TOKEN_EXPIRY_DAYS=7
          GOOGLE_CLIENT_ID=test-client-id.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET=test-client-secret
          OAUTH_REDIRECT_URL=http://localhost:8080/auth/callback
          GOFLAGS=-tags=e2etest
          VITE_API_URL=http://localhost:8080
          VITE_WS_URL=ws://localhost:8080/query
          VITE_GOOGLE_CLIENT_ID=test-client-id.apps.googleusercontent.com
          EOF

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for attempt in {1..60}; do
            status="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || true)"
            if [ "$status" = "200" ]; then
              echo "API is healthy"
              exit 0
            fi
            docker compose ps
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Wait for frontend
        run: |
          for attempt in {1..60}; do
            status="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 || true)"
            if [ "$status" = "200" ]; then
              echo "Frontend is ready"
              exit 0
            fi
            docker compose ps
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/
          if-no-files-found: ignore

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v
