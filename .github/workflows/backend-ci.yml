name: backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: backend/go.sum
      - name: Download dependencies
        working-directory: backend
        run: go mod download
      - name: Lint
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/backend:/workspace" \
            -w /workspace \
              golangci/golangci-lint:v1.64.8 \
            golangci-lint run ./...
      - name: Test
        working-directory: backend
        run: go test ./... -race -count=1

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: backend/go.sum
      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0
          for attempt in {1..30}; do
            if docker exec mongo mongosh --quiet --eval 'db.runCommand({ ping: 1 })' >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec mongo mongosh --quiet --eval 'rs.initiate()'
          for attempt in {1..30}; do
            state="$(docker exec mongo mongosh --quiet --eval 'rs.status().myState' 2>/dev/null || true)"
            if [ "$state" = "1" ]; then
              echo "Replica set primary is ready"
              break
            fi
            sleep 1
          done
      - name: Download dependencies
        working-directory: backend
        run: go mod download
      - name: Run integration tests
        working-directory: backend
        env:
          MONGODB_TEST_URI: mongodb://localhost:27017/?replicaSet=rs0
        run: go test -tags integration ./internal/alerting/... -count=1

  build-image:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build production image
        run: docker build --target prod -t pulseops-api:${{ github.sha }} backend
      - name: Save image for security scan
        run: docker save pulseops-api:${{ github.sha }} -o pulseops-api.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v5
        with:
          name: pulseops-api-image
          path: pulseops-api.tar
          retention-days: 1

  security-scan:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: pulseops-api-image
      - name: Load image
        run: docker load -i pulseops-api.tar
      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pulseops-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pulseops-api:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RESOURCE_GROUP: pulseops-rg
      CONTAINER_APP_NAME: pulseops-api
      IMAGE: pulseopsregistry.azurecr.io/pulseops-api:${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Log in to Azure Container Registry
        run: az acr login --name pulseopsregistry
      - uses: docker/setup-buildx-action@v4
      - name: Build and push production image
        run: |
          docker build --target prod -t "$IMAGE" backend
          docker push "$IMAGE"
      - name: Deploy Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"
      - name: Verify health endpoint
        run: |
          fqdn="$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          url="https://${fqdn}/health"
          for attempt in {1..30}; do
            status="$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)"
            if [ "$status" = "200" ]; then
              echo "Health check passed: $url"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed: $url"
          exit 1
