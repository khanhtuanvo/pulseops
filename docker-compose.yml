services:
  mongo:
    image: mongo:7
    command: --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pulseops

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command: >
      mongosh --host mongo:27017 --quiet --eval
      "try {
        rs.status();
      } catch (err) {
        rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]});
      }"
    networks:
      - pulseops

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    networks:
      - pulseops

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pulseops

volumes:
  mongo_data:

networks:
  pulseops:
    driver: bridge
